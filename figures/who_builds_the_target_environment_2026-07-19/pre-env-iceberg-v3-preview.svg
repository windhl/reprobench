<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D9EEFF"/><stop offset="1" stop-color="#8EC5EA"/>
    </linearGradient>
    <linearGradient id="ice" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FDFF"/><stop offset="1" stop-color="#CBE9F7"/>
    </linearGradient>
    <marker id="up" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto"><path d="M0 6L5 0l5 6Z" fill="#2F6FED"/></marker>
    <style>
      text{font-family:Arial,Helvetica,sans-serif}.navy{fill:#17324D}.blue{fill:#2F6FED}.red{fill:#B43838}.muted{fill:#61717F}.center{text-anchor:middle}.bold{font-weight:700}.caps{font-weight:800;letter-spacing:.6px}.small{font-size:12px}
    </style>
  </defs>

  <rect width="1600" height="900" fill="#F7FAFC"/>
  <text x="70" y="58" class="navy caps" font-size="30">WHAT LIES BEFORE EXPLOITATION?</text>
  <text x="72" y="87" class="muted" font-size="15">Most benchmarks begin when the target is already runnable. ReproBench begins with only a vulnerability identifier.</text>

  <!-- sky and sea -->
  <rect x="50" y="115" width="1500" height="255" rx="16" fill="#F4F8FC" stroke="#D5DEE6"/>
  <path d="M50 370H1550V790H50Z" fill="url(#sea)"/>
  <path d="M50 370H1550" stroke="#2587C6" stroke-width="7"/>
  <path d="M50 385q80-18 160 0t160 0t160 0t160 0t160 0t160 0t160 0t160 0t160 0t160 0t160 0" fill="none" stroke="#66AEDB" stroke-width="3" opacity=".75"/>

  <!-- iceberg, visible tip and submerged body -->
  <path d="M620 370L720 192L785 245L845 160L930 275L1015 370Z" fill="url(#ice)" stroke="#87BFD9" stroke-width="3"/>
  <path d="M360 370L1240 370L1155 472L1250 540L1100 620L995 735L800 775L600 735L485 630L300 550L420 472Z" fill="url(#ice)" stroke="#70ADD0" stroke-width="3"/>
  <path d="M620 370l80 95 100-45 110 50 105-100M485 630l115-95 110 60 90-175M995 735l-65-120 170 5" fill="none" stroke="#A8D4E8" stroke-width="3" opacity=".9"/>

  <!-- zone labels -->
  <rect x="92" y="165" width="220" height="42" rx="21" fill="#FFE2E2" stroke="#D94747"/>
  <text x="202" y="192" class="center red caps" font-size="15">POST-ENV</text>
  <text x="202" y="225" class="center small red">Operate on a ready target</text>
  <rect x="92" y="435" width="220" height="42" rx="21" fill="#DDEBFF" stroke="#2F6FED"/>
  <text x="202" y="462" class="center blue caps" font-size="15">PRE-ENV</text>
  <text x="202" y="494" class="center small" fill="#244F9E">Recover a runnable target</text>

  <!-- Environment-ready waterline -->
  <rect x="570" y="343" width="510" height="54" rx="27" fill="#17324D"/>
  <text x="825" y="365" class="center" fill="#9DE4BC" font-size="12" font-weight="700">ENVIRONMENT-READY BOUNDARY</text>
  <text x="825" y="385" class="center" fill="#FFFFFF" font-size="16" font-weight="800">RUNNABLE TARGET EXISTS</text>

  <!-- Post-env tip -->
  <rect x="705" y="218" width="242" height="95" rx="14" fill="#FFF0F0" stroke="#D94747" stroke-width="3"/>
  <path d="M745 248l-17 31h17l-12 31 40-45h-20l13-17Z" fill="#D94747"/>
  <text x="790" y="250" class="red caps" font-size="14">EXPLOIT / PoC</text>
  <text x="790" y="274" class="red small">Trigger vulnerability</text>
  <text x="790" y="294" class="red small">Collect evidence</text>

  <!-- Pre-env lifecycle inside submerged iceberg -->
  <path d="M800 695V437" stroke="#2F6FED" stroke-width="4" stroke-dasharray="7 7" marker-end="url(#up)"/>
  <rect x="690" y="672" width="220" height="55" rx="12" fill="#FFFFFF" stroke="#2F6FED" stroke-width="2"/>
  <text x="800" y="696" class="center blue caps" font-size="14">CVE-XXXX</text><text x="800" y="715" class="center small" fill="#244F9E">bare identifier</text>
  <rect x="650" y="590" width="300" height="55" rx="12" fill="#FFFFFF" stroke="#2F6FED" stroke-width="2"/>
  <text x="800" y="614" class="center navy bold" font-size="14">Affected product &amp; version</text><text x="800" y="633" class="center small muted">identify the real target</text>
  <rect x="650" y="510" width="300" height="55" rx="12" fill="#FFFFFF" stroke="#2F6FED" stroke-width="2"/>
  <text x="800" y="534" class="center navy bold" font-size="14">Firmware / artifact</text><text x="800" y="553" class="center small muted">locate and acquire</text>
  <rect x="620" y="430" width="360" height="55" rx="12" fill="#FFFFFF" stroke="#2F6FED" stroke-width="2"/>
  <text x="800" y="454" class="center navy bold" font-size="14">RootFS · binary · libraries · config</text><text x="800" y="473" class="center small muted">extract, identify, and rehost</text>

  <!-- Starting point callouts -->
  <circle cx="1055" cy="699" r="12" fill="#2F6FED"/><path d="M1055 687V615h115" fill="none" stroke="#2F6FED" stroke-width="3"/>
  <rect x="1168" y="585" width="310" height="62" rx="12" fill="#E5EFFF" stroke="#2F6FED" stroke-width="2"/>
  <text x="1323" y="610" class="center blue caps" font-size="13">REPROBENCH STARTS HERE</text>
  <text x="1323" y="631" class="center small" fill="#244F9E">Only a CVE identifier is given</text>

  <circle cx="1095" cy="370" r="12" fill="#6C7985"/><path d="M1095 358V280h75" fill="none" stroke="#6C7985" stroke-width="3"/>
  <rect x="1168" y="247" width="310" height="66" rx="12" fill="#EDF0F3" stroke="#8A97A3" stroke-width="2"/>
  <text x="1323" y="274" class="center caps" fill="#566471" font-size="13">PRIOR BENCHMARKS START HERE</text>
  <text x="1323" y="296" class="center small" fill="#566471">Repository / binary / container is ready</text>

  <!-- Scope brackets -->
  <path d="M1510 208h-22v162h22" fill="none" stroke="#6C7985" stroke-width="4"/>
  <text x="1534" y="289" transform="rotate(90 1534 289)" class="center caps" fill="#566471" font-size="11">PRIOR SCOPE</text>
  <path d="M1540 208h22v519h-22" fill="none" stroke="#2F6FED" stroke-width="4"/>
  <text x="1578" y="468" transform="rotate(90 1578 468)" class="center blue caps" font-size="11">REPROBENCH SCOPE</text>

  <!-- Footer -->
  <rect x="175" y="818" width="1250" height="52" rx="11" fill="#17324D"/>
  <text x="800" y="850" class="center" fill="#FFFFFF" font-size="16" font-weight="800">MOST BENCHMARKS EVALUATE THE TIP. REPROBENCH EVALUATES THE PATH THAT MAKES IT POSSIBLE.</text>
</svg>
