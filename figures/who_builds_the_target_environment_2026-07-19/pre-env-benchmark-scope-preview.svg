  <rect x="925" y="545" width="195" height="115" rx="10" fill="#FFF0CC" stroke="#E69F00" stroke-width="3"/><text x="1022" y="583" class="center" fill="#8A5C00" font-size="15" font-weight="800">REHOST</text><text x="1022" y="608" class="center tiny" fill="#8A5C00">emulation · dependencies</text><text x="1022" y="626" class="center tiny" fill="#8A5C00">NVRAM · network</text><text x="923" y="550" class="center" fill="#E69F00" font-size="36">⚙</text>
