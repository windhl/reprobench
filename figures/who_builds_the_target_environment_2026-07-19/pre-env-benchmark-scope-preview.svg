    <style>
      text{font-family:Arial,Helvetica,sans-serif}.navy{fill:#17324D}.muted{fill:#5D6B78}.small{font-size:12px}.tiny{font-size:10px}.label{font-size:13px;font-weight:700;letter-spacing:.3px}.panelTitle{font-size:21px;font-weight:700}.center{text-anchor:middle}.white{fill:#fff}
    </style>
